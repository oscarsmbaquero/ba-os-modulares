  @if (!cookieService.consentGiven()) {
      <div #bannerContainer class="fixed bottom-6 left-6 right-6 md:left-auto md:right-8 md:max-w-sm z-[100] bg-surface-container-lowest/95 backdrop-blur-xl border border-outline-variant/30 shadow-ambient p-6 md:p-8 rounded-2xl overflow-hidden opacity-0">
        <div class="absolute top-0 left-0 w-1 h-full bg-on-tertiary-container"></div>
        
        <div class="flex items-start gap-4 mb-6">
          <div class="w-10 h-10 bg-on-tertiary-container/10 text-on-tertiary-container flex items-center justify-center shrink-0 rounded-full">
            <mat-icon>cookie</mat-icon>
          </div>
          <div>
            <h3 class="text-sm font-display font-bold text-primary uppercase tracking-widest mb-1">Privacidad</h3>
            <p class="text-[0.7rem] text-on-surface-variant leading-relaxed font-medium">
              Utilizamos cookies para mejorar su experiencia y analizar el tráfico.
            </p>
          </div>
        </div>

        @if (showSettings()) {
          <div class="space-y-3 mb-6 py-4 border-y border-outline-variant/20 animate-in fade-in slide-in-from-top-2 duration-300">
            <div class="flex items-center justify-between p-2 rounded-lg bg-surface/50">
              <div>
                <p class="text-[0.65rem] font-bold text-primary uppercase tracking-wider">Necesarias</p>
                <p class="text-[0.6rem] text-on-surface-variant">Esenciales para el sitio.</p>
              </div>
              <div class="w-8 h-4 bg-on-tertiary-container/30 rounded-full relative opacity-50 cursor-not-allowed">
                <div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
              </div>
            </div>

            <div class="flex items-center justify-between p-2 rounded-lg bg-surface/50">
              <div>
                <p class="text-[0.65rem] font-bold text-primary uppercase tracking-wider">Analíticas</p>
                <p class="text-[0.6rem] text-on-surface-variant">Estadísticas de uso.</p>
              </div>
              <button (click)="tempPrefs.analytics = !tempPrefs.analytics" 
                      [class.bg-on-tertiary-container]="tempPrefs.analytics"
                      [class.bg-outline-variant]="!tempPrefs.analytics"
                      class="w-8 h-4 rounded-full relative transition-colors duration-200">
                <div class="absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all duration-200"
                     [style.left]="tempPrefs.analytics ? '1.125rem' : '0.125rem'"></div>
              </button>
            </div>

            <div class="flex items-center justify-between p-2 rounded-lg bg-surface/50">
              <div>
                <p class="text-[0.65rem] font-bold text-primary uppercase tracking-wider">Marketing</p>
                <p class="text-[0.6rem] text-on-surface-variant">Publicidad relevante.</p>
              </div>
              <button (click)="tempPrefs.marketing = !tempPrefs.marketing" 
                      [class.bg-on-tertiary-container]="tempPrefs.marketing"
                      [class.bg-outline-variant]="!tempPrefs.marketing"
                      class="w-8 h-4 rounded-full relative transition-colors duration-200">
                <div class="absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all duration-200"
                     [style.left]="tempPrefs.marketing ? '1.125rem' : '0.125rem'"></div>
              </button>
            </div>
          </div>
        }

        <div class="flex flex-col gap-2">
          @if (!showSettings()) {
            <div class="grid grid-cols-2 gap-2">
              <button (click)="cookieService.acceptAll()" 
                      class="px-4 py-3 bg-primary text-white text-[0.6rem] font-bold uppercase tracking-widest hover:bg-primary-container transition-colors">
                Aceptar
              </button>
              <button (click)="cookieService.rejectAll()" 
                      class="px-4 py-3 bg-surface-container-low text-primary text-[0.6rem] font-bold uppercase tracking-widest border border-outline-variant/30 hover:bg-surface-container-high transition-colors">
                Rechazar
              </button>
            </div>
            <button (click)="showSettings.set(true)" 
                    class="px-4 py-2 bg-surface border border-outline-variant/30 text-[0.6rem] font-bold text-primary uppercase tracking-widest hover:bg-surface-container-low transition-colors text-center">
              Configurar
            </button>
          } @else {
            <button (click)="saveSettings()" 
                    class="px-4 py-3 bg-primary text-white text-[0.6rem] font-bold uppercase tracking-widest hover:bg-primary-container transition-colors">
              Guardar
            </button>
            <button (click)="showSettings.set(false)" 
                    class="px-4 py-2 bg-surface border border-outline-variant/30 text-[0.6rem] font-bold text-primary uppercase tracking-widest hover:bg-surface-container-low transition-colors text-center">
              Volver
            </button>
          }
        </div>
      </div>
    }
