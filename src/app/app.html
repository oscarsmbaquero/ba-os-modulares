<div class="flex flex-col min-h-screen relative">
  <app-navbar></app-navbar>
  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
  <app-cookie-banner></app-cookie-banner>

  <!-- Botón flotante -->
<button 
  (click)="toggleChat()" 
  class="fixed bottom-1/4 right-0 z-[9999] bg-primary text-on-primary shadow-lg flex flex-col items-center gap-1 px-2 py-4 rounded-l-xl cursor-pointer hover:bg-primary-container transition-colors">
  <mat-icon>support_agent</mat-icon>
  <!-- <span class="text-xs font-medium [writing-mode:vertical-rl] rotate-180">Ayuda</span> -->
</button>

  <!-- Panel flotante -->
  @if (chatOpen()) {
    <div class="fixed bottom-24 right-6 z-50 w-[380px] max-w-[calc(100vw-2rem)] h-[600px] max-h-[calc(100vh-8rem)] bg-surface shadow-xl border border-outline-variant/20 rounded-2xl overflow-hidden flex flex-col">
      
      <div class="flex items-center justify-between px-5 py-4 bg-surface-container border-b border-outline-variant/20">
        <div>
          <h2 class="text-sm font-bold text-primary uppercase tracking-wide">¿Tiene dudas rápidas?</h2>
          <p class="text-xs text-on-surface-variant mt-0.5">Asistente virtual IA</p>
        </div>
        <button (click)="toggleChat()" class="text-on-surface-variant hover:text-primary transition-colors">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="flex-1 overflow-hidden flex flex-col">
        <app-ai-bot class="flex-1 flex flex-col"></app-ai-bot>
      </div>
    </div>
  }
</div>
